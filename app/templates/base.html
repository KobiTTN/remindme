<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}RemindMe{% endblock %}</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f5f7fa; }
    .navbar-brand { font-weight: 700; letter-spacing: -0.5px; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); border-radius: 12px; }
    .reminder-card { border-left: 4px solid #0d6efd; }
    .reminder-card.sent { border-left-color: #6c757d; opacity: .75; }
    .badge-sent { background: #e9ecef; color: #6c757d; }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-bell-fill me-2"></i>RemindMe</a>
    <div class="ms-auto">
      {% if user is defined %}
        <span class="text-white me-3 small">👤 {{ user.first_name }}</span>
        <form action="/logout" method="post" class="d-inline">
          <button class="btn btn-outline-light btn-sm">Вийти</button>
        </form>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container pb-5">
  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
